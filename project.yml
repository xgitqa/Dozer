name: Dozer
options:
  usesTabs: false
  tabWidth: 4
  createIntermediateGroups: true
  xcodeVersion: 15.0
  deploymentTarget: 10.13
targets:
  Dozer:
    type: application
    platform: macOS
    deploymentTarget: 
      macOS: 10.13
    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig
    sources:
      - Dozer
    postBuildScripts:
      - path: Scripts/LaunchAtLogin.sh
        name: Launch At Login
        runOnlyWhenInstalling: true
      - path: Scripts/SignFrameworks.sh
        name: Sign Frameworks
        runOnlyWhenInstalling: true
      - script: |
          if [ -x /opt/homebrew/bin/swiftgen ]; then
            /opt/homebrew/bin/swiftgen
          elif [ -x /usr/local/bin/swiftgen ]; then
            /usr/local/bin/swiftgen
          else
            echo "error: SwiftGen not installed"
            exit 1
          fi
        name: Generate files using SwiftGen
      - path: Scripts/Swiftlint.sh
        name: Swiftlint
    settings:
      base:
        CODE_SIGN_ENTITLEMENTS: Dozer/Other/Dozer.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: "com.mortennn.Dozer"
        SWIFT_VERSION: 5
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        ENABLE_HARDENED_RUNTIME: true
        MACOSX_DEPLOYMENT_TARGET: 10.13
        VERSIONING_SYSTEM: apple-generic
        CURRENT_PROJECT_VERSION: 30
        ARCHS: "arm64 x86_64"
        VALID_ARCHS: "arm64 x86_64"
    dependencies:
      - carthage: LaunchAtLogin
      - carthage: Defaults
      - carthage: Preferences
      - carthage: MASShortcut
      - carthage: Sparkle
schemes:
  Dozer:
    build:
      targets:
        Dozer: all
