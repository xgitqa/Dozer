name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v4.1.0)'
        required: true
        default: 'v4.1.0'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: brew bundle

      - name: Generate Xcode project
        run: |
          mkdir -p Dozer/Other/Generated
          /opt/homebrew/bin/swiftgen
          xcodegen

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/Dozer-*/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Build archive (universal)
        run: |
          set -o pipefail
          xcodebuild \
            -project Dozer.xcodeproj \
            -scheme Dozer \
            -configuration Release \
            -archivePath build/Dozer.xcarchive \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive 2>&1 | tee build.log
          grep -q "ARCHIVE SUCCEEDED" build.log || (echo "Archive failed" && exit 1)

      - name: Package app as zip
        run: |
          mkdir -p build/export
          cp -R build/Dozer.xcarchive/Products/Applications/Dozer.app build/export/Dozer.app
          cd build/export && zip -r "../Dozer-${{ steps.tag.outputs.name }}-universal.zip" Dozer.app

      - name: Verify universal binary
        run: |
          lipo -info build/export/Dozer.app/Contents/MacOS/Dozer
          lipo -info build/export/Dozer.app/Contents/MacOS/Dozer | grep -q "arm64" || (echo "ERROR: arm64 slice missing" && exit 1)
          echo "Universal binary verified"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: build/Dozer-${{ steps.tag.outputs.name }}-universal.zip
          generate_release_notes: true
          body: |
            ## Dozer ${{ steps.tag.outputs.name }} — Apple Silicon fork

            Universal binary: **Apple Silicon (arm64)** + **Intel (x86_64)**. No Rosetta required.
            Requires macOS 12 Monterey or later.

            ### Install
            1. Download `Dozer-${{ steps.tag.outputs.name }}-universal.zip` and unzip it
            2. Drag `Dozer.app` to your Applications folder

            > **First-launch note:** This build is unsigned. Right-click the app and choose **Open**,
            > or clear the quarantine flag first:
            > ```
            > xattr -cr /Applications/Dozer.app
            > ```

            ### Changes from upstream
            - Native Apple Silicon support (universal binary, no Rosetta)
            - Upgraded to Sparkle 2.x
            - Replaced MASShortcut with KeyboardShortcuts
            - Migrated from Carthage to Swift Package Manager
            - Requires macOS 12+ (up from 10.13)
