name: Build

on:
  push:
    branches:
      - master
      - claude/wizardly-feynman-LbX1M
  pull_request:
    branches:
      - master

jobs:
  build:
    name: Build (Apple Silicon)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: brew bundle

      - name: Cache Carthage
        uses: actions/cache@v4
        with:
          path: Carthage
          key: ${{ runner.os }}-carthage-${{ hashFiles('Cartfile.resolved') }}
          restore-keys: |
            ${{ runner.os }}-carthage-

      - name: Bootstrap Carthage (xcframeworks)
        run: carthage bootstrap --cache-builds --platform osx --use-xcframeworks

      - name: Generate Xcode project
        run: |
          mkdir -p Dozer/Other/Generated
          /opt/homebrew/bin/swiftgen
          xcodegen

      - name: Build (universal arm64 + x86_64)
        run: |
          xcodebuild \
            -project Dozer.xcodeproj \
            -scheme Dozer \
            -configuration Release \
            -archivePath build/Dozer.xcarchive \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive | xcpretty

      - name: Extract and package app
        run: |
          mkdir -p build/export
          cp -R build/Dozer.xcarchive/Products/Applications/Dozer.app build/export/Dozer.app
          cd build/export && zip -r ../Dozer-dev-universal.zip Dozer.app

      - name: Verify universal binary
        run: |
          lipo -info build/export/Dozer.app/Contents/MacOS/Dozer
          lipo -info build/export/Dozer.app/Contents/MacOS/Dozer | grep -q "arm64" || (echo "ERROR: arm64 slice missing" && exit 1)
          lipo -info build/export/Dozer.app/Contents/MacOS/Dozer | grep -q "x86_64" || (echo "ERROR: x86_64 slice missing" && exit 1)
          echo "Universal binary verified"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Dozer-universal
          path: build/Dozer-dev-universal.zip
          retention-days: 7
